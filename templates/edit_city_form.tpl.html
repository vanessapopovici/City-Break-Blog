{% extends "base.tpl.html" %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="card shadow" style="width: 100%; max-width: 900px; margin: 0 auto; border-radius: 12px; border: none;">
        <div class="card-header bg-dark text-white" style="border-radius: 12px 12px 0 0; padding: 20px;">
            <h3 class="mb-0">Editează orașul: {{ city.title }}</h3>
        </div>
        <div class="card-body" style="padding: 40px;">
        
        <form action="edit_city.php" method="POST" enctype="multipart/form-data">
            <input type="hidden" name="id" value="{{ city.id }}">
            
            <div class="form-group mb-4">
                <label style="font-weight: bold; font-size: 1.1em;">Numele destinației (Titlu):</label>
                <input type="text" class="form-control form-control-lg" name="title" value="{{ city.title }}" style="width: 100%; max-width: 100%;" required>
            </div>

            <div class="form-group mb-4">
                <label style="font-weight: bold; font-size: 1.1em;">Scurtă descriere (Subtitlu):</label>
                <input type="text" class="form-control form-control-lg" name="title_description" value="{{ city.title_description }}" style="width: 100%; max-width: 100%;" required>
            </div>

            <div class="form-group mb-4">
                <label style="font-weight: bold; font-size: 1.1em;">Descriere detaliată:</label>
                <textarea class="form-control form-control-lg" name="long_description" rows="5" required>{{ city.long_description }}</textarea>
            </div>

            <div class="form-group mb-5">
                <label style="font-weight: bold; font-size: 1.1em;">Imagine principală (Cover):</label>
                
                {% if city.img != '' %}
                <div class="mb-3 p-3" style="background: #f9f9f9; border-radius: 8px; border: 1px solid #eaeaea;">
                    <img src="templates/pictures/{{ city.img }}" alt="Imagine curentă" style="max-height: 120px; border-radius: 5px; margin-bottom: 15px; display: block;">
                    
                    <div style="display: flex; align-items: center;">
                        <input type="checkbox" id="delete_image" name="delete_image" value="1" style="width: 18px; height: 18px; margin-right: 8px; cursor: pointer;">
                        <label for="delete_image" style="color: #dc3545; font-weight: bold; margin: 0; cursor: pointer;">Șterge imaginea curentă</label>
                    </div>
                </div>
                {% endif %}

                <p class="text-muted small mb-2">Lasă gol dacă vrei să păstrezi imaginea actuală (sau alege o imagine nouă care o va suprascrie pe cea veche).</p>
                <div class="custom-file">
                    <input type="file" class="custom-file-input" id="gallery_image" name="gallery_image" accept="image/*">
                    <label class="custom-file-label" for="gallery_image">Alege o imagine nouă...</label>
                </div>
            </div>

            <button type="submit" class="btn btn-warning btn-lg btn-block" style="font-size: 1.2em; padding: 15px; font-weight: bold; color: #212529;">Salvează modificările</button>
            <a href="manage_cities.php" class="btn btn-secondary btn-lg btn-block mt-3" style="font-size: 1.2em; padding: 15px;">Anulează</a>
        </form>
        
        </div>
    </div>
</div>

<script>
    // Script pentru a afișa numele imaginii selectate în input
    document.querySelector('.custom-file-input').addEventListener('change', function(e) {
        if(e.target.files.length > 0) {
            var fileName = e.target.files[0].name;
            var nextSibling = e.target.nextElementSibling;
            nextSibling.innerText = fileName;
        }
    });
</script>
{% endblock %}
