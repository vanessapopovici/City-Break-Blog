{% extends "base.tpl.html" %}

{% block content %}
<div class="container mt-4 mb-5">
    <h2 class="mb-4">Toate Orașele (Modul Admin)</h2>

    {% for city in result_cities %}
        <div class="card shadow-sm mb-4" style="border-radius: 8px; border: 1px solid #eaeaea;">
            <div class="card-body">
                <h4 class="mb-1" style="color: #007bff; font-weight: 500;">{{ city.title }}</h4>
                <p class="text-muted" style="font-size: 0.95em;">{{ city.title_description }}</p>
                
                <div class="mt-3">
                    <a href="show_gallery.php?id={{ city.id }}" class="btn btn-outline-primary btn-sm" style="border-radius: 4px; margin-right: 5px; width: 120px;">Vezi orașul</a>
                    <a href="edit_city_form.php?id={{ city.id }}" class="btn btn-warning btn-sm" style="border-radius: 4px; font-weight: 500; margin-right: 5px; color: #212529; width: 90px;">Editează</a>
                    <a href="delete_city.php?id={{ city.id }}" class="btn btn-danger btn-sm" style="border-radius: 4px; width: 90px;" onclick="return confirm('Ești sigur că vrei să ștergi acest oraș? ATENȚIE: Toate articolele asociate acestui oraș ar putea fi afectate sau șterse!');">Șterge</a>
                </div>
            </div>
        </div>
    {% else %}
        <div class="alert alert-info shadow-sm" style="border-radius: 8px;">
            Nu există niciun oraș (destinație) adăugat în sistem momentan.
        </div>
    {% endfor %}
</div>
{% endblock %}
